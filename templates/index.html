        // ===== 封面预览浮窗 =====
        let previewTimeout = null;
        let lastMouseX = 0, lastMouseY = 0;

        function repositionPreview() {
            const preview = document.getElementById('coverPreview');
            if (preview.style.display !== 'grid') return;
            const rect = preview.getBoundingClientRect();
            const w = rect.width;
            const h = rect.height;
            if (w === 0 || h === 0) { requestAnimationFrame(repositionPreview); return; }
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const offset = 14;
            let left = lastMouseX + offset;
            let top = lastMouseY + offset;
            if (left + w > vw) left = lastMouseX - w - offset;
            if (top + h > vh) top = lastMouseY - h - offset;
            if (left < 10) left = 10;
            if (top < 10) top = 10;
            if (left + w > vw - 10) left = vw - w - 10;
            if (top + h > vh - 10) top = vh - h - 10;
            preview.style.left = left + 'px';
            preview.style.top = top + 'px';
        }

        function showPreview(e) {
            const preview = document.getElementById('coverPreview');
            const img = document.getElementById('previewImage');
            const filename = document.getElementById('previewFilename');
            const size = document.getElementById('previewSize');
            const format = document.getElementById('previewFormat');
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            if (!currentCoverData.path) {
                img.src = PLACEHOLDER_SVG;
                filename.textContent = '占位图 (无封面)';
                size.textContent = '48×48';
                format.textContent = 'SVG';
            } else {
                const coverSrc = document.getElementById('playerCover').src;
                img.src = coverSrc;
                filename.textContent = currentCoverData.name || '未知';
                const w = currentCoverData.width || 0;
                const h = currentCoverData.height || 0;
                size.textContent = w && h ? `${w}×${h}` : '加载中...';
                format.textContent = currentCoverData.format || '未知';
            }
            preview.style.display = 'grid';
            repositionPreview();
            img.onload = function() {
                if (this.naturalWidth) {
                    currentCoverData.width = this.naturalWidth;
                    currentCoverData.height = this.naturalHeight;
                    size.textContent = `${this.naturalWidth}×${this.naturalHeight}`;
                }
                repositionPreview();
            };
            if (img.complete && img.naturalWidth) {
                currentCoverData.width = img.naturalWidth;
                currentCoverData.height = img.naturalHeight;
                size.textContent = `${img.naturalWidth}×${img.naturalHeight}`;
                setTimeout(repositionPreview, 20);
            }
        }

        function hidePreview() {
            const preview = document.getElementById('coverPreview');
            preview.style.display = 'none';
            const img = document.getElementById('previewImage');
            img.onload = null;
        }

        const playerCoverEl = document.getElementById('playerCover');
        playerCoverEl.addEventListener('mouseenter', (e) => {
            clearTimeout(previewTimeout);
            previewTimeout = setTimeout(() => { showPreview(e); }, 300);
        });
        playerCoverEl.addEventListener('mouseleave', () => {
            clearTimeout(previewTimeout);
            previewTimeout = null;
            hidePreview();
        });

        let previewResizeTimer = null;
        window.addEventListener('resize', () => {
            const preview = document.getElementById('coverPreview');
            if (preview.style.display === 'grid') {
                clearTimeout(previewResizeTimer);
                previewResizeTimer = setTimeout(repositionPreview, 100);
            }
        });
        window.addEventListener('scroll', () => {
            const preview = document.getElementById('coverPreview');
            if (preview.style.display === 'grid') {
                repositionPreview();
            }
        }, { passive: true });
        document.addEventListener('mousemove', (e) => {
            const preview = document.getElementById('coverPreview');
            if (preview.style.display === 'grid') {
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                repositionPreview();
            }
        });

        // ===== 核心数据构建 =====
        function buildDisplaySongs(originalSongs, splitMap) {
            const result = [];
            for (const song of originalSongs) {
                const id = song.id;
                if (splitMap[id] && splitMap[id].length > 0) {
                    const subIds = splitMap[id];
                    for (const subId of subIds) {
                        const cuePath = subId.split('|')[1];
                        if (!cuePath) continue;
                        const idx = song.cueTrackMap[cuePath];
                        if (idx === undefined) continue;
                        const subSong = {
                            id: subId,
                            original_titles: song.original_titles,
                            performers: [song.cueTrackPerformerMap[cuePath] || ''],
                            cueFiles: [cuePath],
                            cueTrackMap: { [cuePath]: idx },
                            cueCoverMap: { [cuePath]: song.cueCoverMap[cuePath] },
                            cueAlbumMap: { [cuePath]: song.cueAlbumMap[cuePath] },
                            cueArtistMap: { [cuePath]: song.cueArtistMap[cuePath] },
                            cueTrackPerformerMap: { [cuePath]: song.cueTrackPerformerMap[cuePath] || '' },
                            cueTrackTitleMap: { [cuePath]: song.cueTrackTitleMap[cuePath] || song.original_titles[0] },
                            audioFile: song.audioFile,
                            cueRef: cuePath,
                            trackIndex: idx,
                            cover: song.cueCoverMap[cuePath] || null,
                            path: cuePath,
                            _isSplit: true,
                            _parentId: id,
                        };
                        result.push(subSong);
                    }
                    const splitCues = subIds.map(sid => sid.split('|')[1]);
                    const remainingCues = song.cueFiles.filter(c => !splitCues.includes(c));
                    if (remainingCues.length > 0) {
                        const remainingSong = { ...song };
                        remainingSong.cueFiles = remainingCues;
                        remainingSong.cueTrackMap = {};
                        remainingSong.cueCoverMap = {};
                        remainingSong.cueAlbumMap = {};
                        remainingSong.cueArtistMap = {};
                        remainingSong.cueTrackPerformerMap = {};
                        remainingSong.cueTrackTitleMap = {};
                        remainingSong.performers = [];
                        for (const c of remainingCues) {
                            remainingSong.cueTrackMap[c] = song.cueTrackMap[c];
                            remainingSong.cueCoverMap[c] = song.cueCoverMap[c];
                            remainingSong.cueAlbumMap[c] = song.cueAlbumMap[c];
                            remainingSong.cueArtistMap[c] = song.cueArtistMap[c];
                            remainingSong.cueTrackPerformerMap[c] = song.cueTrackPerformerMap[c] || '';
                            remainingSong.cueTrackTitleMap[c] = song.cueTrackTitleMap[c] || song.original_titles[0];
                            const perf = song.cueTrackPerformerMap[c] || '';
                            if (perf && !remainingSong.performers.includes(perf)) remainingSong.performers.push(perf);
                        }
                        remainingSong.cueRef = remainingCues[0];
                        remainingSong.trackIndex = song.cueTrackMap[remainingCues[0]];
                        remainingSong.cover = song.cueCoverMap[remainingCues[0]] || null;
                        remainingSong.path = remainingCues[0];
                        remainingSong._isSplit = false;
                        remainingSong._parentId = undefined;
                        result.push(remainingSong);
                    }
                } else {
                    result.push({ ...song, _isSplit: false });
                }
            }
            return result;
        }

        // ===== 拆分模态框 =====
        function openSplitModal(parentId) {
            const original = state.songs.find(s => s.id === parentId);
            if (!original) {
                showToast('该条目已不存在，请刷新列表。', 'warning');
                return;
            }
            const allCues = original.cueFiles;
            let splitCues = [];
            if (state.splitMap[parentId]) {
                splitCues = state.splitMap[parentId].map(sid => sid.split('|')[1]);
            }
            const availableCues = allCues.filter(c => !splitCues.includes(c));
            if (availableCues.length === 0) {
                showToast('该条目所有来源均已拆分，无法再拆分。', 'warning');
                return;
            }
            state._pendingSplitParentId = parentId;
            let listHtml = '';
            availableCues.forEach(cue => {
                const perf = original.cueTrackPerformerMap[cue] || '';
                const title = original.cueTrackTitleMap[cue] || original.original_titles[0];
                listHtml += `
                    <li>
                        <input type="checkbox" data-cue="${escapeHtml(cue)}" />
                        <span class="cue-info">${escapeHtml(cue)}</span>
                        <span class="perf-info">${perf ? '🎤 ' + escapeHtml(perf) : ''}</span>
                        <span style="color:#94a3b8;font-size:12px;">${escapeHtml(title)}</span>
                    </li>
                `;
            });
            sourceList.innerHTML = listHtml;
            splitModal.style.display = 'flex';
        }

        function confirmSplit() {
            const parentId = state._pendingSplitParentId;
            if (!parentId) return;
            const original = state.songs.find(s => s.id === parentId);
            if (!original) {
                showToast('父条目已不存在，请刷新列表。', 'warning');
                closeModal();
                return;
            }
            const checkboxes = sourceList.querySelectorAll('input[type="checkbox"]:checked');
            const selectedCues = Array.from(checkboxes).map(cb => cb.dataset.cue);
            if (selectedCues.length === 0) {
                showToast('请至少选择一个来源进行拆分。', 'error');
                return;
            }
            let existingSplitCues = [];
            if (state.splitMap[parentId]) {
                existingSplitCues = state.splitMap[parentId].map(sid => sid.split('|')[1]);
            }
            const newCues = selectedCues.filter(c => !existingSplitCues.includes(c));
            if (newCues.length === 0) {
                showToast('所选来源均已拆分，无需重复操作。', 'info');
                closeModal();
                return;
            }
            const allSplitCues = [...existingSplitCues, ...newCues];
            const subIds = allSplitCues.map(cue => `${parentId}|${cue}`);
            state.splitMap[parentId] = subIds;
            if (state.selected.has(parentId)) {
                state.selected.delete(parentId);
                for (const sid of subIds) {
                    state.selected.add(sid);
                }
            }
            state.displaySongs = buildDisplaySongs(state.songs, state.splitMap);
            saveState();
            updateUI();
            closeModal();
        }

        function mergeBack(subId) {
            const subSong = state.displaySongs.find(s => s.id === subId);
            if (!subSong || !subSong._parentId) {
                showToast('该条目已不存在或已合并，请刷新列表。', 'warning');
                return;
            }
            const parentId = subSong._parentId;
            const parentExists = state.songs.some(s => s.id === parentId);
            if (!parentExists) {
                showToast('父条目已不存在，无法合并。', 'error');
                return;
            }
            if (state.splitMap[parentId]) {
                state.splitMap[parentId] = state.splitMap[parentId].filter(id => id !== subId);
                if (state.splitMap[parentId].length === 0) {
                    delete state.splitMap[parentId];
                }
            } else {
                showToast('父条目已不存在，无法合并。', 'error');
                return;
            }
            if (state.selected.has(subId)) {
                state.selected.delete(subId);
                const parentDisplay = state.displaySongs.some(s => s.id === parentId);
                if (parentDisplay) {
                    state.selected.add(parentId);
                }
            }
            state.displaySongs = buildDisplaySongs(state.songs, state.splitMap);
            saveState();
            updateUI();
        }

        function closeModal() {
            splitModal.style.display = 'none';
            state._pendingSplitParentId = null;
        }

        modalConfirmBtn.addEventListener('click', confirmSplit);
        modalCancelBtn.addEventListener('click', closeModal);
        modalCloseBtn.addEventListener('click', closeModal);
        splitModal.addEventListener('click', (e) => {
            if (e.target === splitModal) closeModal();
        });

        // ===== LocalStorage =====
        const STORAGE_KEY = 'cue_tool_state';

        function saveState() {
            const data = {
                dirs: state.dirs,
                selected: Array.from(state.selected),
                splitMap: state.splitMap,
                version: 3,
            };
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
        }

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return null;
                return JSON.parse(raw);
            } catch (e) { return null; }
        }

        // ===== 导出状态 =====
        function exportState() {
            const data = {
                dirs: state.dirs,
                splitMap: state.splitMap,
                selected: Array.from(state.selected),
                version: 3,
                exportedAt: new Date().toISOString()
            };
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `cue_state_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            scanStatus.textContent = '✅ 状态已导出';
            scanStatus.style.color = '#10b981';
        }

        // ===== 导入状态 =====
        function importState(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.dirs || !data.splitMap || !data.selected) {
                        throw new Error('无效的状态文件，缺少必要字段');
                    }
                    state.dirs = data.dirs || [];
                    state.splitMap = data.splitMap || {};
                    state.selected = new Set(data.selected || []);
                    state._pendingSelected = null;
                    
                    state.songs = [];
                    state.displaySongs = [];
                    state.playlist = [];
                    state.playIndex = -1;
                    if (currentAudio) hidePlayer();
                    
                    renderDirs();
                    if (state.dirs.length > 0) {
                        scanAll();
                    } else {
                        state.displaySongs = [];
                        renderSongs();
                        updateSelectedPanel();
                        updateComputeBtn();
                    }
                    saveState();
                    scanStatus.textContent = '✅ 状态导入成功，已开始扫描';
                    scanStatus.style.color = '#10b981';
                } catch (err) {
                    scanStatus.textContent = '❌ 导入失败: ' + err.message;
                    scanStatus.style.color = '#ef4444';
                    console.error('导入状态错误:', err);
                }
            };
            reader.readAsText(file);
        }

        function restoreState() {
            const saved = loadState();
            if (!saved) return false;
            state.dirs = saved.dirs || [];
            state._pendingSelected = new Set(saved.selected || []);
            state.splitMap = saved.splitMap || {};
            renderDirs();
            return true;
        }

        function restoreSelectedAfterScan() {
            if (!state._pendingSelected) return;
            const validIds = new Set(state.displaySongs.map(s => s.id));
            for (const id of state._pendingSelected) {
                if (validIds.has(id)) state.selected.add(id);
            }
            state._pendingSelected = null;
            updateUI();
            saveState();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ===== 目录管理 =====
        function addDirectoryInternal(path) {
            if (!path) return false;
            if (state.dirs.includes(path)) {
                scanStatus.textContent = `⚠️ 目录已存在: ${path}`;
                scanStatus.style.color = '#f59e0b';
                return false;
            }
            state.dirs.push(path);
            renderDirs();
            scanStatus.textContent = `已添加目录: ${path}`;
            scanStatus.style.color = '#10b981';
            saveState();
            return true;
        }

        function renderDirs() {
            if (state.dirs.length === 0) {
                dirList.innerHTML = '<span style="color:#94a3b8;font-size:13px;">还没有添加目录</span>';
                return;
            }
            dirList.innerHTML = state.dirs.map((d, i) => `
                <span class="dir-tag">
                    ${escapeHtml(d)}
                    <span class="del" data-index="${i}">✕</span>
                </span>
            `).join('');
            dirList.querySelectorAll('.del').forEach(el => {
                el.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    state.dirs.splice(idx, 1);
                    renderDirs();
                    state.songs = [];
                    state.displaySongs = [];
                    state.selected.clear();
                    state.splitMap = {};
                    renderSongs();
                    updateSelectedPanel();
                    scanStatus.textContent = '目录已更新，请重新扫描';
                    saveState();
                    hidePlayer();
                });
            });
        }

        async function browseDirectory() {
            scanStatus.textContent = '⏳ 正在打开文件夹选择窗口...';
            scanStatus.style.color = '#475569';
            try {
                const resp = await fetch('/api/browse');
                const data = await resp.json();
                if (!data.success) {
                    scanStatus.textContent = '❌ ' + (data.error || '选择失败');
                    scanStatus.style.color = '#ef4444';
                    return;
                }
                const path = data.path;
                newDirInput.value = path;
                const added = addDirectoryInternal(path);
                if (added) newDirInput.value = '';
                newDirInput.focus();
                newDirInput.select();
            } catch (err) {
                scanStatus.textContent = '❌ 请求失败: ' + err.message;
                scanStatus.style.color = '#ef4444';
            }
        }

        function addDirectory() {
            const path = newDirInput.value.trim();
            if (!path) {
                scanStatus.textContent = '⚠️ 请输入目录路径';
                scanStatus.style.color = '#ef4444';
                return;
            }
            if (addDirectoryInternal(path)) newDirInput.value = '';
        }

        // ===== 扫描 =====
        async function scanAll() {
            if (state.dirs.length === 0) {
                scanStatus.textContent = '⚠️ 请先添加至少一个目录';
                scanStatus.style.color = '#ef4444';
                return;
            }
            scanStatus.textContent = '⏳ 正在扫描...';
            scanStatus.style.color = '#475569';
            scanAllBtn.disabled = true;
            scanAllBtn.innerHTML = '<span class="spinner"></span> 扫描中';
            try {
                const resp = await fetch('/api/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dirs: state.dirs })
                });
                const data = await resp.json();
                if (!data.success) {
                    scanStatus.textContent = '❌ ' + (data.error || '扫描失败');
                    scanStatus.style.color = '#ef4444';
                    return;
                }
                state.songs = data.songs || [];
                state.displaySongs = buildDisplaySongs(state.songs, state.splitMap);
                restoreSelectedAfterScan();
                if (state.displaySongs.length === 0) {
                    scanStatus.textContent = '⚠️ 未找到任何歌曲，请检查目录路径是否正确';
                    scanStatus.style.color = '#f59e0b';
                } else {
                    const splitCount = Object.keys(state.splitMap).length;
                    scanStatus.textContent =
                        `✅ 扫描完成，共 ${state.displaySongs.length} 首歌曲（合并后 ${state.songs.length} 组，已拆分 ${splitCount} 组），来自 ${data.cueCount || 0} 个 CUE 文件`;
                    scanStatus.style.color = '#10b981';
                }
                saveState();
                updateUI();
                state.playlist = [];
                state.playIndex = -1;
                hidePlayer();
            } catch (err) {
                scanStatus.textContent = '❌ 请求失败: ' + err.message;
                scanStatus.style.color = '#ef4444';
            } finally {
                scanAllBtn.disabled = false;
                scanAllBtn.innerHTML = '🔍 扫描全部';
            }
        }

        // ===== 渲染歌曲列表 =====
        function renderSongs() {
            const search = state.searching.trim().toLowerCase();
            let filtered = state.displaySongs;
            if (search) {
                filtered = state.displaySongs.filter(s => {
                    const origMatch = (s.original_titles || []).some(t => t.toLowerCase().includes(search));
                    const performerMatch = (s.performers || []).some(p => p.toLowerCase().includes(search));
                    return origMatch || performerMatch;
                });
            }
            if (state.displaySongs.length === 0) {
                songList.innerHTML = `<div class="empty-msg">📂 请添加目录并扫描</div>`;
                countDisplay.innerHTML = '共 <strong>0</strong> 首';
                headerCheckbox.checked = false;
                return;
            }
            if (filtered.length === 0) {
                songList.innerHTML =
                    `<div class="empty-msg">🔍 没有匹配 "${escapeHtml(state.searching)}" 的歌曲</div>`;
                countDisplay.innerHTML = `共 <strong>${state.displaySongs.length}</strong> 首`;
                headerCheckbox.checked = false;
                return;
            }

            let html = '';
            for (const song of filtered) {
                const checked = state.selected.has(song.id) ? 'checked' : '';
                const sources = song.cueFiles || [song.path];
                const originals = song.original_titles || [];
                const mainTitle = originals.length > 0 ? originals[0] : song.id;
                const altTitles = originals.slice(1).filter(t => t !== mainTitle);
                const cueTrackMap = song.cueTrackMap || {};
                const cueCoverMap = song.cueCoverMap || {};
                const cueAlbumMap = song.cueAlbumMap || {};
                const cueTrackPerformerMap = song.cueTrackPerformerMap || {};
                const cueTrackTitleMap = song.cueTrackTitleMap || {};

                const original = state.songs.find(s => s.id === song.id);
                let isMerged = false;
                if (original && !song._isSplit) {
                    const remainingCues = song.cueFiles || [];
                    if (remainingCues.length > 1) {
                        isMerged = true;
                    }
                }
                const isSplit = song._isSplit === true;

                let sourcesHtml = '';
                for (const cue of sources) {
                    const idx = cueTrackMap[cue];
                    const hasTrack = idx !== undefined;
                    const coverForCue = cueCoverMap[cue] || '';
                    const albumForCue = cueAlbumMap[cue] || '';
                    const performerForCue = cueTrackPerformerMap[cue] || '';
                    const rawTitle = cueTrackTitleMap[cue] || mainTitle;

                    const playBtn = hasTrack ?
                        `<button class="play-btn" data-cue="${escapeHtml(cue)}" data-index="${idx}" data-song-id="${escapeHtml(song.id)}" data-title="${escapeHtml(rawTitle)}" data-cover="${escapeHtml(coverForCue)}" data-album="${escapeHtml(albumForCue)}" data-artist="${escapeHtml(performerForCue)}" title="播放此来源的曲目片段">▶</button>` :
                        '';

                    const downloadBtn = hasTrack ?
                        `<button class="download-btn" data-cue="${escapeHtml(cue)}" data-index="${idx}" data-title="${escapeHtml(rawTitle)}" data-artist="${escapeHtml(performerForCue)}" title="下载此来源的曲目">⬇</button>` :
                        '';

                    const performerTag = performerForCue ?
                        `<span class="performer-tag" title="${escapeHtml(performerForCue)}">🎤 ${escapeHtml(performerForCue)}</span>` :
                        '';

                    sourcesHtml += `<span class="cue-path" data-path="${escapeHtml(cue)}">
                        <span class="cue-file">${escapeHtml(cue)}</span>
                        ${performerTag}
                        ${playBtn}
                        ${downloadBtn}
                    </span>`;
                }

                const splitBtnHtml = (isMerged) ?
                    `<button class="split-btn" data-id="${song.id}" title="拆分为独立版本（每个来源一首）">✂️</button>` :
                    '';
                const mergeBtnHtml = (isSplit) ?
                    `<button class="merge-btn" data-id="${song.id}" title="合并回父条目">↺</button>` :
                    '';

                const splitLabel = isSplit ? ' [拆]' : '';

                html += `
                    <div class="song-item" data-id="${song.id}">
                        <input type="checkbox" class="song-checkbox" data-id="${song.id}" ${checked} />
                        <div class="info">
                            <div class="title">${escapeHtml(mainTitle)}${splitLabel} ${splitBtnHtml} ${mergeBtnHtml}</div>
                            ${altTitles.length > 0 ? `<div class="alt-titles">${altTitles.map(t => `<span class="alt">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
                            <div class="sources">${sourcesHtml}</div>
                        </div>
                    </div>
                `;
            }
            songList.innerHTML = html;

            songList.querySelectorAll('.play-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const cuePath = btn.dataset.cue;
                    const index = parseInt(btn.dataset.index);
                    const songId = btn.dataset.songId;
                    const title = btn.dataset.title || '未知歌曲';
                    const cover = btn.dataset.cover || '';
                    const album = btn.dataset.album || '';
                    const artist = btn.dataset.artist || '';
                    if (!cuePath || isNaN(index)) {
                        console.warn('缺少 cue 或 index');
                        return;
                    }

                    let pos = state.playlist.findIndex(item => item.songId === songId);
                    if (pos === -1) {
                        const song = state.displaySongs.find(s => s.id === songId);
                        if (song) {
                            const item = {
                                cue: cuePath,
                                index: index,
                                title: title,
                                cover: cover,
                                album: album,
                                artist: artist,
                                songId: songId
                            };
                            state.playlist.push(item);
                            pos = state.playlist.length - 1;
                        } else {
                            console.warn('未找到歌曲:', songId);
                            return;
                        }
                    } else {
                        state.playlist[pos].cue = cuePath;
                        state.playlist[pos].index = index;
                        state.playlist[pos].title = title;
                        state.playlist[pos].cover = cover;
                        state.playlist[pos].album = album;
                        state.playlist[pos].artist = artist;
                    }

                    state.playIndex = pos;
                    const item = state.playlist[pos];
                    playSong(item.cue, item.index, item.title, item.cover, item.album, item.artist, item.songId, false, true);
                });
            });
            songList.querySelectorAll('.download-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const cuePath = btn.dataset.cue;
                    const index = parseInt(btn.dataset.index);
                    const title = btn.dataset.title || '';
                    const artist = btn.dataset.artist || '';
                    downloadAudio(cuePath, index, title, artist);
                });
            });
            songList.querySelectorAll('.split-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    if (id) {
                        openSplitModal(id);
                    }
                });
            });
            songList.querySelectorAll('.merge-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    if (id) {
                        mergeBack(id);
                    }
                });
            });
            songList.querySelectorAll('.song-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const id = e.target.dataset.id;
                    if (e.target.checked) state.selected.add(id);
                    else state.selected.delete(id);
                    updateUI();
                    saveState();
                });
            });
            songList.querySelectorAll('.song-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' || e.target.closest(
                            '.cue-path')) return;
                    const cb = item.querySelector('.song-checkbox');
                    if (cb) { cb.checked = !cb.checked;
                        cb.dispatchEvent(new Event('change')); }
                });
            });

            countDisplay.innerHTML = `共 <strong>${state.displaySongs.length}</strong> 首`;
            updateSelectedPanel();
            updateHeaderCheckbox();
            updateComputeBtn();
        }

        // ===== 其他辅助函数 =====
        function selectAllVisible() {
            const search = state.searching.trim().toLowerCase();
            let filtered = state.displaySongs;
            if (search) {
                filtered = state.displaySongs.filter(s => {
                    const origMatch = (s.original_titles || []).some(t => t.toLowerCase().includes(search));
                    const performerMatch = (s.performers || []).some(p => p.toLowerCase().includes(search));
                    return origMatch || performerMatch;
                });
            }
            for (const s of filtered) state.selected.add(s.id);
            updateUI();
            saveState();
        }

        function deselectAllVisible() {
            const search = state.searching.trim().toLowerCase();
            let filtered = state.displaySongs;
            if (search) {
                filtered = state.displaySongs.filter(s => {
                    const origMatch = (s.original_titles || []).some(t => t.toLowerCase().includes(search));
                    const performerMatch = (s.performers || []).some(p => p.toLowerCase().includes(search));
                    return origMatch || performerMatch;
                });
            }
            for (const s of filtered) state.selected.delete(s.id);
            updateUI();
            saveState();
        }

        function updateHeaderCheckbox() {
            const search = state.searching.trim().toLowerCase();
            let filtered = state.displaySongs;
            if (search) {
                filtered = state.displaySongs.filter(s => {
                    const origMatch = (s.original_titles || []).some(t => t.toLowerCase().includes(search));
                    const performerMatch = (s.performers || []).some(p => p.toLowerCase().includes(search));
                    return origMatch || performerMatch;
                });
            }
            const vis = filtered.length;
            const checked = filtered.filter(s => state.selected.has(s.id)).length;
            if (vis === 0) { headerCheckbox.checked = false;
                headerCheckbox.indeterminate = false; } else if (checked === vis) { headerCheckbox.checked = true;
                headerCheckbox.indeterminate = false; } else if (checked === 0) { headerCheckbox.checked = false;
                headerCheckbox.indeterminate = false; } else { headerCheckbox.checked = false;
                headerCheckbox.indeterminate = true; }
        }

        function updateSelectedPanel() {
            const selectedSongs = state.displaySongs.filter(s => state.selected.has(s.id));
            selectedCount.textContent = selectedSongs.length;
            if (selectedSongs.length === 0) {
                selectedList.innerHTML = '<span style="color:#94a3b8;font-size:13px;">暂无选择</span>';
            } else {
                selectedList.innerHTML = selectedSongs.map(s => {
                    const main = (s.original_titles || [])[0] || s.id;
                    return `<span class="selected-item" data-id="${s.id}">
                        <span class="selected-text" style="cursor:pointer;text-decoration:underline;">${escapeHtml(main)}</span>
                        <span class="selected-remove" style="cursor:pointer;margin-left:6px;color:#ef4444;font-weight:bold;font-size:14px;">✕</span>
                    </span>`;
                }).join('');

                selectedList.querySelectorAll('.selected-text').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const item = el.closest('.selected-item');
                        const id = item.dataset.id;
                        const targetItem = findSongElementById(id);
                        if (targetItem) {
                            targetItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            targetItem.style.transition = 'background 0.3s';
                            targetItem.style.background = '#fef3c7';
                            setTimeout(() => {
                                targetItem.style.background = '';
                            }, 1500);
                        } else {
                            console.warn('未找到歌曲元素:', id);
                        }
                    });
                });

                selectedList.querySelectorAll('.selected-remove').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const item = el.closest('.selected-item');
                        const id = item.dataset.id;
                        state.selected.delete(id);
                        updateUI();
                        saveState();
                    });
                });
            }
            updateComputeBtn();
        }

        function updateComputeBtn() {
            const count = state.selected.size;
            computeBtn.disabled = (count === 0 || state.displaySongs.length === 0);
            hintText.textContent = count === 0 ? '请勾选歌曲' : `已选 ${count} 首，点击计算`;
        }

        function updateUI() {
            renderSongs();
            updateSelectedPanel();
            updateHeaderCheckbox();
            updateComputeBtn();
            state.results = null;
            resultArea.classList.remove('visible');
        }

        // ===== 计算 =====
        async function computeBest() {
            if (state.selected.size === 0) return;
            computeBtn.disabled = true;
            computeBtn.innerHTML = '<span class="spinner"></span> 计算中';

            const K = parseInt(document.getElementById('KInput').value) || 20;
            const w_c = parseFloat(document.getElementById('w_c_input').value) || 10;
            const w_m = parseFloat(document.getElementById('w_m_input').value) || 5;
            const w_e = parseFloat(document.getElementById('w_e_input').value) || 1;

            try {
                const resp = await fetch('/api/compute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        songs: state.displaySongs,
                        selected: Array.from(state.selected),
                        K: K,
                        w_c: w_c,
                        w_m: w_m,
                        w_e: w_e
                    })
                });
                const data = await resp.json();
                if (!data.success) {
                    showToast('计算失败: ' + (data.error || '未知错误'), 'error');
                    return;
                }
                state.results = data.schemes;
                renderResults(data.schemes, data.totalSelected);
            } catch (err) {
                showToast('请求失败: ' + err.message, 'error');
            } finally {
                computeBtn.disabled = false;
                computeBtn.innerHTML = '🧮 计算最佳组合';
            }
        }

        // ===== 查找歌曲DOM元素 =====
        function findSongElementById(id) {
            let target = document.querySelector(`.song-item[data-id="${id}"]`);
            if (target) return target;
            const displaySong = state.displaySongs.find(s => s.id === id);
            if (displaySong && displaySong._parentId) {
                const parentId = displaySong._parentId;
                const parentDisplay = state.displaySongs.find(s => s.id === parentId);
                if (parentDisplay) {
                    target = document.querySelector(`.song-item[data-id="${parentId}"]`);
                    if (target) return target;
                }
                const siblings = state.displaySongs.filter(s => s._parentId === parentId && s.id !== id);
                if (siblings.length > 0) {
                    target = document.querySelector(`.song-item[data-id="${siblings[0].id}"]`);
                    if (target) return target;
                }
            }
            const original = state.songs.find(s => s.id === id);
            if (original) {
                const children = state.displaySongs.filter(s => s._parentId === id);
                if (children.length > 0) {
                    target = document.querySelector(`.song-item[data-id="${children[0].id}"]`);
                    if (target) return target;
                }
            }
            return null;
        }

        // ===== 渲染结果 =====
        function renderResults(schemes, totalSelected) {
            resultArea.classList.add('visible');
            resultBadge.textContent = `${schemes.length} 个方案`;
            if (schemes.length === 0) {
                resultContent.innerHTML = '<p style="color:#94a3b8;">没有找到任何覆盖方案，请检查是否选中有歌曲未被任何 CUE 包含。</p>';
                return;
            }
            let html = '';
            schemes.forEach((scheme, idx) => {
                const isBest = idx === 0;
                const coveredCount = scheme.covered.length;
                const missCount = scheme.miss.length;
                const extraCount = scheme.extra_count || 0;
                const total = totalSelected;
                const percent = total > 0 ? Math.round((coveredCount / total) * 100) : 0;

                let missHtml = '';
                if (missCount > 0) {
                    missHtml = `<div style="margin-top:6px;"><span class="miss-song-label">缺失歌曲：</span> ${scheme.miss.map(id => {
                        const displaySong = state.displaySongs.find(s => s.id === id);
                        const originalSong = state.songs.find(s => s.id === id);
                        const song = displaySong || originalSong;
                        const title = song && song.original_titles ? song.original_titles[0] : id;
                        return `<span class="miss-song" data-song-id="${escapeHtml(id)}" style="cursor:pointer;text-decoration:underline;color:#ca8a04;">${escapeHtml(title)}</span>`;
                    }).join('、')}</div>`;
                }

                let extraHtml = '';
                if (extraCount > 0 && scheme.extra && scheme.extra.length > 0) {
                    const extraMap = {};
                    scheme.extra.forEach(id => { extraMap[id] = (extraMap[id] || 0) + 1; });
                    const extraDisplay = Object.keys(extraMap).map(id => {
                        const displaySong = state.displaySongs.find(s => s.id === id);
                        const originalSong = state.songs.find(s => s.id === id);
                        const song = displaySong || originalSong;
                        const title = song && song.original_titles ? song.original_titles[0] : id;
                        const count = extraMap[id];
                        return `<span class="extra-song" data-song-id="${escapeHtml(id)}" style="cursor:pointer;text-decoration:underline;color:#dc2626;">${escapeHtml(title)}${count > 1 ? ` (×${count})` : ''}</span>`;
                    });
                    extraHtml = `<div style="margin-top:6px;"><span class="extra-song-label">额外歌曲（重复）：</span> ${extraDisplay.join('、')}</div>`;
                }

                html += `
                    <div class="scheme-card">
                        <div class="scheme-header">
                            <strong>方案 ${idx + 1}</strong>
                            ${isBest ? '<span class="tag-best">⭐ 推荐</span>' : ''}
                            <span class="extra-info">
                                <span class="${missCount === 0 ? 'good' : 'bad'}">✅ 覆盖 ${coveredCount}/${total} (${percent}%)</span>
                                ${missCount > 0 ? `<span class="bad">❌ 缺失 ${missCount} 首</span>` : ''}
                                ${extraCount > 0 ? `<span class="neutral">➕ 额外 ${extraCount} 首</span>` : ''}
                                <span>📁 ${scheme.cueFiles.length} 个 CUE</span>
                            </span>
                        </div>
                        <div style="margin-top:8px;font-size:13px;">
                            <div><strong>使用的 CUE 文件：</strong></div>
                            <ul class="cue-list">
                                ${scheme.cueFiles.map(c => `<li><span class="cue-path" data-path="${escapeHtml(c.path)}" style="cursor:pointer;text-decoration:underline;color:#3b82f6;">${escapeHtml(c.path)}</span> (${c.songs.length} 首)</li>`).join('')}
                            </ul>
                            ${missHtml}
                            ${extraHtml}
                        </div>
                    </div>
                `;
            });
            resultContent.innerHTML = html;

            resultContent.querySelectorAll('.cue-path').forEach(el => {
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const path = this.dataset.path;
                    if (!path) return;
                    fetch('/api/open_file', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path: path })
                    }).then(res => res.json()).then(data => {
                        if (!data.success) showToast('打开失败: ' + (data.error || '未知错误'), 'error');
                    }).catch(err => showToast('请求失败: ' + err.message, 'error'));
                });
            });

            const scrollHandler = function(e) {
                const songId = this.dataset.songId;
                if (!songId) return;
                const targetItem = findSongElementById(songId);
                if (targetItem) {
                    targetItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    targetItem.style.transition = 'background 0.3s';
                    targetItem.style.background = '#fef3c7';
                    setTimeout(() => { targetItem.style.background = ''; }, 1500);
                } else {
                    console.warn('未找到歌曲元素:', songId);
                }
            };

            resultContent.querySelectorAll('.miss-song, .extra-song').forEach(el => {
                el.addEventListener('click', scrollHandler);
            });
        }

        // ===== 播放器标题点击滚动 =====
        document.getElementById('playerTitle').addEventListener('click', function() {
            if (!currentSongId) {
                showToast('当前无播放歌曲', 'error');

        function setExportFormEnabled(enabled) {
            const controls = [exportDirInput, exportFormat, exportTemplate, exportDuplicate, exportBrowseBtn];
            controls.forEach(el => el.disabled = !enabled);
        }

        // ===== 导出功能 =====
        function openExportModal() {
            if (state.selected.size === 0) {
                showToast('请先选择要导出的歌曲', 'warning');
                return;
            }
            // 启用所有表单控件
            setExportFormEnabled(true);
            exportDirInput.value = '';
            exportTemplate.value = '{title} - {artist}';
            exportProgressArea.style.display = 'none';
            exportProgress.value = 0;
            exportLog.innerHTML = '';
            exportStartBtn.textContent = '🚀 开始导出';
            exportStartBtn.disabled = false;
            exportStartBtn.onclick = startExport;

        }

        function closeExportModal() {
            exportModal.style.display = 'none';
            setExportFormEnabled(true);
            exportStartBtn.textContent = '🚀 开始导出';
            exportStartBtn.disabled = false;
            exportStartBtn.onclick = startExport;
            exportProgressArea.style.display = 'none';
            exportProgress.value = 0;
            exportLog.innerHTML = '';
            detachFormChangeListener();

        async function browseExportDir() {
            try {
                const resp = await fetch('/api/browse');
                const data = await resp.json();
                if (data.success) {
                    exportDirInput.value = data.path;
                } else {
                    showToast('选择目录失败: ' + (data.error || ''), 'error');
                }
            } catch (err) {
                showToast('请求失败: ' + err.message, 'error');
            }
        }

        async function startExport() {
            const targetDir = exportDirInput.value.trim();
            if (!targetDir) {
                showToast('请指定保存目录', 'error');
                return;
            }
            const format = exportFormat.value;
            const template = exportTemplate.value.trim() || '{title} - {artist}';
            const duplicate = exportDuplicate.value;

            // 获取选中的歌曲列表
            const selectedSongs = state.displaySongs.filter(s => state.selected.has(s.id));
            if (selectedSongs.length === 0) {
                showToast('没有选中的歌曲', 'error');
                return;
            }

            // 准备数据（只传递必要字段）
            const songsData = selectedSongs.map(s => ({
                id: s.id,
                original_titles: s.original_titles,
                performers: s.performers,
                cueFiles: s.cueFiles,
                cueTrackMap: s.cueTrackMap,
                cueCoverMap: s.cueCoverMap,
                cueAlbumMap: s.cueAlbumMap,
                cueArtistMap: s.cueArtistMap,
                cueTrackPerformerMap: s.cueTrackPerformerMap,
                cueTrackTitleMap: s.cueTrackTitleMap,
                cueRef: s.cueRef || (s.cueFiles ? s.cueFiles[0] : null),
                trackIndex: s.trackIndex,
                cover: s.cover,
                path: s.path,
                _isSplit: s._isSplit,
                _parentId: s._parentId,
            }));

            // 显示进度区域
            exportStartBtn.onclick = null; // 避免导出过程中再次触发
            detachFormChangeListener();
            exportProgressArea.style.display = 'block';
            exportProgress.value = 0;
            exportLog.innerHTML = '准备导出...';
            setExportFormEnabled(false);
            exportStartBtn.disabled = true;
            exportStartBtn.textContent = '导出中...';

            try {
                const response = await fetch('/api/export', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        songs: songsData,
                        targetDir: targetDir,
                        format: format,
                        template: template,
                        duplicate: duplicate
                    })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`服务器错误 (${response.status}): ${errText}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const jsonStr = line.substring(6);
                            try {
                                const event = JSON.parse(jsonStr);
                                handleExportEvent(event);
                            } catch (e) {
                                console.warn('解析事件失败:', jsonStr);
                            }
                        }
                    }
                }

                // 处理可能剩余的数据
                if (buffer.startsWith('data: ')) {
                    const jsonStr = buffer.substring(6);
                    try {
                        const event = JSON.parse(jsonStr);
                        handleExportEvent(event);
                    } catch (e) {}
                }

            } catch (err) {
                showToast('导出失败: ' + err.message, 'error');
                appendExportLog('❌ 错误: ' + err.message);
            } finally {
                exportStartBtn.disabled = false;
                exportStartBtn.textContent = '✅ 完成';
            }
        }

        function handleExportEvent(event) {
            const type = event.event;
            if (type === 'progress') {
                const current = event.current || 0;
                const total = event.total || 1;
                const percent = Math.round((current / total) * 100);
                exportProgress.value = percent;
                const status = event.status || 'processing';
                const songId = event.songId || '';
                const title = event.title || '未知歌曲';
                let msg = event.msg || '';
                let statusText = '';
                switch (status) {
                    case 'success': statusText = '✅ 成功'; break;
                    case 'overwrite': statusText = '🔄 覆盖'; break;
                    case 'renamed': statusText = '📝 重命名'; break;
                    case 'skipped': statusText = '⏭️ 跳过'; break;
                    case 'error': statusText = '❌ 错误'; break;
                    default: statusText = '⏳ 处理中';
                }
                const logMsg = `[${current}/${total}] ${statusText} ${title} ${msg ? ': ' + msg : ''}`;
                appendExportLog(logMsg);
            } else if (type === 'complete') {
                const total = event.total || 0;
                const success = event.success || 0;
                const skipped = event.skipped || 0;
                const errors = event.errors || 0;
                appendExportLog(`\n📊 导出完成！共 ${total} 首，成功 ${success}，跳过 ${skipped}，错误 ${errors}`);
                showToast(`导出完成：成功 ${success} 首`, 'success');
                
                exportStartBtn.textContent = '✅ 完成';
                exportStartBtn.disabled = false;
                // 点击按钮关闭模态框
                exportStartBtn.onclick = function() {
                    closeExportModal();
                };
                // 启用表单（允许修改）
                setExportFormEnabled(true);
                // 添加监听器，一旦表单改变则重置按钮
                attachFormChangeListener();
            } else {
                console.warn('未知事件类型:', type);
            }
        }

        function appendExportLog(text) {
            const log = exportLog;
            const p = document.createElement('div');
            p.textContent = text;
            log.appendChild(p);
            log.scrollTop = log.scrollHeight;
        }

        let formChangeListenerAttached = false;

        function attachFormChangeListener() {
            if (formChangeListenerAttached) return;
            const controls = [exportDirInput, exportFormat, exportTemplate, exportDuplicate];
            controls.forEach(el => {
                el.addEventListener('input', onFormChange);
                el.addEventListener('change', onFormChange);
            });
            formChangeListenerAttached = true;
        }

        function onFormChange() {
            // 只有当按钮显示为“完成”时才重置
            if (exportStartBtn.textContent === '✅ 完成') {
                exportStartBtn.textContent = '🚀 开始导出';
                exportStartBtn.onclick = startExport;
                // 移除监听，避免重复触发
                detachFormChangeListener();
            }
        }

        function detachFormChangeListener() {
            const controls = [exportDirInput, exportFormat, exportTemplate, exportDuplicate];
            controls.forEach(el => {
                el.removeEventListener('input', onFormChange);
                el.removeEventListener('change', onFormChange);
            });
            formChangeListenerAttached = false;
        }

        // ===== 事件绑定（全局）=====
        addDirBtn.addEventListener('click', addDirectory);
        newDirInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addDirectory(); });
        browseDirBtn.addEventListener('click', browseDirectory);
        scanAllBtn.addEventListener('click', scanAll);
        searchInput.addEventListener('input', (e) => {
            state.searching = e.target.value;
            renderSongs();
            updateHeaderCheckbox();
        });
        headerCheckbox.addEventListener('change', (e) => {
            const checked = e.target.checked;
            const search = state.searching.trim().toLowerCase();
            let filtered = state.displaySongs;
            if (search) {
                filtered = state.displaySongs.filter(s => {
                    const origMatch = (s.original_titles || []).some(t => t.toLowerCase().includes(search));
                    const performerMatch = (s.performers || []).some(p => p.toLowerCase().includes(search));
                    return origMatch || performerMatch;
                });
            }
            for (const s of filtered) {
                if (checked) state.selected.add(s.id);
                else state.selected.delete(s.id);
            }
            updateUI();
            saveState();
        });
        selectAllBtn.addEventListener('click', selectAllVisible);
        deselectAllBtn.addEventListener('click', deselectAllVisible);
        computeBtn.addEventListener('click', computeBest);
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
                const active = document.activeElement;
                if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;
                e.preventDefault();
                selectAllVisible();
            }
        });

        // Ctrl+点击cue-path打开文件
        document.getElementById('songList').addEventListener('click', function(e) {
            const cuePathEl = e.target.closest('.cue-path');
            if (!cuePathEl) return;
            if (e.target.closest('.play-btn')) return;
            if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                const path = cuePathEl.dataset.path;
                if (!path) return;
                fetch('/api/open_file', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: path })
                }).then(res => res.json()).then(data => {
                    if (!data.success) showToast('打开失败: ' + (data.error || '未知错误'), 'error');
                }).catch(err => showToast('请求失败: ' + err.message, 'error'));
            }
        });

        // Ctrl键样式
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey || e.metaKey) {
                if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
                document.querySelectorAll('.cue-path').forEach(el => {
                    el.classList.add('ctrl-hover');
                });
            }
        });
        document.addEventListener('keyup', function(e) {
            if (!e.ctrlKey && !e.metaKey) {
                document.querySelectorAll('.cue-path').forEach(el => {
                    el.classList.remove('ctrl-hover');
                });
            }
        });
        window.addEventListener('blur', function() {
            document.querySelectorAll('.cue-path').forEach(el => {
                el.classList.remove('ctrl-hover');
            });
        });

        // ===== 导出事件绑定 =====
        document.getElementById('saveSelectedBtn').addEventListener('click', openExportModal);
        exportCloseBtn.addEventListener('click', closeExportModal);
        exportCancelBtn.addEventListener('click', closeExportModal);
        exportModal.addEventListener('click', (e) => {
            if (e.target === exportModal) closeExportModal();
        });
        exportBrowseBtn.addEventListener('click', browseExportDir);

        // ===== 导出/导入状态 =====
        document.getElementById('exportStateBtn').addEventListener('click', exportState);
        document.getElementById('importStateBtn').addEventListener('click', function() {
            document.getElementById('importFileInput').click();
        });
        document.getElementById('importFileInput').addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                importState(this.files[0]);
            }
            this.value = '';
        });

        document.getElementById('playerDownloadBtn').addEventListener('click', function() {
            if (!currentAudio || state.playlist.length === 0 || state.playIndex === -1) {
                showToast('当前没有正在播放的歌曲', 'error');
                return;
            }
            const item = state.playlist[state.playIndex];
            if (!item) {
                showToast('无法获取当前歌曲信息', 'error');
                return;
            }
            downloadAudio(item.cue, item.index, item.title || '', item.artist || '');
        });

        // ===== 初始化 =====
        function init() {
            const hasSaved = restoreState();
            if (hasSaved) {
                renderDirs();
                renderSongs();
                updateSelectedPanel();
                updateComputeBtn();
            } else {
                renderDirs();
                renderSongs();
                updateSelectedPanel();
                updateComputeBtn();
            }
            if (hasSaved && state.dirs.length > 0) {
                setTimeout(() => scanAll(), 300);
            } else {
                state._pendingSelected = null;
            }
            state.initialized = true;
            console.log('🎵 工具已初始化，支持导出选中歌曲。');
        }
        init();
    </script>
</body>
</html>
